server:
  port: 9002

spring:
  datasource:
    url: jdbc:h2:mem:userdb
    username: sa
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
#    path: /h2-console

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
  service-url:
    defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true