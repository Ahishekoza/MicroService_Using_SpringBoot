server:
  port: 9191

spring:
  application:
    name: cloud-gateway

  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/user/**, /api/user/**
          filters:
            - name: CircuitBreaker
              args:
                name: userServiceCB
                fallbackUri: forward:/user-fallback

        - id: department-service
          uri: lb://DEPARTMENT-SERVICE
          predicates:
            - Path=/department/**, /api/department/**
          filters:
            - name: CircuitBreaker
              args:
                name: departmentServiceCB
                fallbackUri: forward:/department-fallback

resilience4j:
  circuitbreaker:
    instances:
      user-service:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 2s

      department-service:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 2s

  retry:
    instances:
      user-service:
        maxAttempts: 3
        waitDuration: 1s
      department-service:
        maxAttempts: 3
        waitDuration: 1s

  timelimiter:
    instances:
      user-service:
        timeoutDuration: 5s
      department-service:
        timeoutDuration: 5s

management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers,retries,timelimiters
  endpoint:
    health:
      show-details: always

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true