server:
  port: 9191

spring:
    cloud:
      gateway:
        routes:
          - id: user-service
            uri: http://localhost:9002
            predicates:
              - Path=/user/**
          - id: department-service
            uri: http://localhost:9001
            predicates:
              - Path=/department/**

eureka:
    client:
        register-with-eureka: true
        fetch-registry: true
    service-url:
        defaultZone: http://localhost:8761/eureka/
    instance:
        prefer-ip-address: true